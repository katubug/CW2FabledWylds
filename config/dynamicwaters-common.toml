["River Flow Speeds"]
	#Flow speed multiplier for players in the river.
	# Default: 0.2
	# Range: 0.0 ~ 10.0
	playerSpeed = 0.2
	#Flow speed multiplier for animals. Note: Animals have strong swimming AI, you may want to decrease this.
	# Default: 0.1
	# Range: 0.0 ~ 10.0
	animalSpeed = 0.1
	#Flow speed multiplier for water animals (squids, fishes, dolphins). Set to 0 to prevent them from being swept away when their AI pauses.
	# Default: 0.0
	# Range: 0.0 ~ 10.0
	waterMobSpeed = 0.0
	#Flow speed multiplier for dropped items.
	# Default: 0.2
	# Range: 0.0 ~ 10.0
	itemSpeed = 0.2
	#Flow speed multiplier for generic unidentified entities.
	# Default: 0.1
	# Range: 0.0 ~ 10.0
	defaultSpeed = 0.1
	#Flow speed multiplier for Sable / Aeronautics physics ships.
	# Default: 2.0
	# Range: 0.0 ~ 10.0
	sableShipSpeed = 2.0
	#Custom flow speeds for specific entities. Format: modid:name=speed (Example: minecraft:pig=0.8 or alexmobs:bird=0.0)
	customEntitySpeeds = ["minecraft:warden=1.0"]

[Visuals]
	#Enable custom bubble particles in rivers.
	enableRiverParticles = true
	#Spawn rate of river particles. Higher = fewer particles (1 in X blocks per tick).
	# Default: 7
	# Range: 1 ~ 100
	riverParticleDensity = 7
	#Enable visual flowing texture for rivers. If false, water looks stationary but still pushes entities. This idea is to be compatible with Physics Mod. After changing this setting, please click F3+T to reload.
	enableRiverVisualFlow = true

[Generation]
	#The height of underground tunnels carved by normal meandering rivers. Increase for larger caves. (Default: 14)
	# Default: 16
	# Range: 5 ~ 50
	normalRiverTunnelHeight = 16
	#The height of underground tunnels carved by mountain rivers. Increase for larger caves. (Default: 9)
	# Default: 9
	# Range: 5 ~ 50
	mountainRiverTunnelHeight = 9
	#List of biome IDs that will be treated like oceans by Dynamic Waters: no river flow and no river carving.
	#Use the full biome resource location, e.g. minecraft:warm_ocean or mymod:dead_sea.
	#Supports wildcard suffixes when the entry ends with '*', e.g. mymod:*
	biomeBlacklist = []
	#Enable the generation of mountain rivers. Disabling this improves generation performance.
	enableMountainRivers = true

	[Generation."River Widths (EXPERIMENTAL)"]
		#Base width of normal (flat) rivers. (Default: 11.0)
		#A Minecraft restart is REQUIRED after changing these values.
		# Default: 11.0
		# Range: 2.0 ~ 50.0
		normalRiverBaseWidth = 11.0
		#Base width of major normal rivers (40% chance). (Default: 13.0)
		#A Minecraft restart is REQUIRED after changing these values.
		# Default: 13.0
		# Range: 3.0 ~ 50.0
		normalRiverMajorWidth = 13.0
		#The base channel width of main mountain rivers. (Default: 4.0)
		#WARNING: Each degree of branches must have a progressively smaller width by at least 1.0 block
		#(e.g., Main Mountain River = 3.5, 1st Degree = 2.5, 2nd/3rd Degree = 1.5).
		#Otherwise, the pathfinder will misclassify and shorten the river network.
		#A Minecraft restart is REQUIRED after changing these values.
		# Default: 4.0
		# Range: 0.1 ~ 20.0
		mountainRiverBaseWidth = 4.0
		#The random additional channel width of main mountain rivers. (Default: 1.5)
		# Default: 1.5
		# Range: 0.0 ~ 10.0
		mountainRiverRandomWidth = 1.5
		#The base channel width of 1st degree mountain river branches. (Default: 2.5)
		#Must be smaller than mountainRiverBaseWidth by at least 1.0 block.
		#A Minecraft restart is REQUIRED after changing these values.
		# Default: 2.5
		# Range: 0.1 ~ 20.0
		branch1stDegreeBaseWidth = 2.5
		#The random additional channel width of 1st degree mountain river branches. (Default: 1.0)
		# Default: 1.0
		# Range: 0.0 ~ 10.0
		branch1stDegreeRandomWidth = 1.0
		#The base channel width of 2nd/3rd degree mountain river branches. (Default: 1.5)
		#Must be smaller than branch1stDegreeBaseWidth by at least 1.0 block.
		#A Minecraft restart is REQUIRED after changing these values.
		# Default: 1.5
		# Range: 0.1 ~ 20.0
		branch2ndDegreeBaseWidth = 1.5
		#The random additional channel width of 2nd/3rd degree mountain river branches. (Default: 0.5)
		# Default: 0.5
		# Range: 0.0 ~ 10.0
		branch2ndDegreeRandomWidth = 0.5

[Sounds]
	#Enable the ambient flowing sound for rivers.
	enableRiverSound = true

[General]
	#Show the welcome message when joining the world.
	showWelcomeMessage = false
	#Automatically disable underground rivers from the Tectonic mod to improve performance and compatibility with Dynamic Waters.
	disableTectonicUndergroundRivers = true
