#Contact Quests General Configuration
[general]
	#是否启用物流延迟功能 (Enable parcel delivery delay)
	#如果设置为 false，所有包裹将立即送达。
	enable_delivery_time = true
	#自动填充明信片的打字速度 (Auto-fill typing speed)
	#单位：Tick (1 tick = 0.05秒)
	#0 = 立即填充 (关闭打字机效果 / Instant fill)
	#1 = 极快 (Very Fast), 2 = 正常 (Normal), >2 = 慢速 (Slow)
	# Default: 1
	# Range: 0 ~ 100
	auto_fill_speed = 1
	#邮箱已满或发送失败时的重试检测间隔 (Retry interval when mailbox is full)
	#单位：Tick
	# Default: 10
	# Range: 1 ~ 12000
	retry_interval = 10
	#新创建的任务和奖励默认的收件人 (Default target addressee for new rewards)
	#这将作为默认值填入，你可以随时在任务编辑器中修改它。
	default_target_addressee = "QuestNPC"
