[gui]
	showCompletedQuests = false
	#Show chapters where all quests are completed
	showCompletedChapters = false
	#Show quest chain progress in quest list
	showChainInList = false
	#Show chapters with no visible quests
	showEmptyChapters = false

[hud]
	#Show the HUD overlay
	hudEnabled = true
	hudShowCompletedTasks = false
	# Default: 4
	# Range: 0 ~ 1920
	hudPosX = 4
	# Default: 104
	# Range: 0 ~ 1080
	hudPosY = 104
	#Show quest chain progress in HUD
	showChainInHud = false

[general]
	# Default: -1
	# Range: -1 ~ 9223372036854775807
	trackedQuestId = -1
	hudAutoTrack = true
	hudAutoTrackMulti = true
	#Enable UI sounds
	soundEnabled = false
	#UI sound volume (0.0 ~ 1.0)
	# Default: 0.5
	# Range: 0.0 ~ 2.0
	soundVolume = 0.5
