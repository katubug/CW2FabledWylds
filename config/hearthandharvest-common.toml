#Chance (0.0 - 1.0) per check interval (~2 seconds) for a Tree Tapper to collect sap when on a tappable block.
#Higher values make sap fill faster.
# Default: 0.5
# Range: 0.0 ~ 1.0
treeTapperBaseChance = 0.5
#Amount of crops that need to be in an area for a crow to spawn nearby. Used alongside the crowSpawnRadius config to control crow spawning.
#Setting to 0 would prevent crow spawning
# Default: 8
# Range: 0 ~ 192
crowCropRequirement = 8
#Radius that crows check for crops to be in when trying to spawn. Larger radius means higher changes of spawning.
#Setting to 0 would prevent crow spawning
# Default: 8
# Range: 0 ~ 64
crowSpawnRadius = 8
#Radius that players, villgers, and repelling blocks will be effective towards scaring wild crows.
#Setting to 0 would prevent crows from being scared
# Default: 6
# Range: 0 ~ 64
crowScareRadius = 6
#Whether water bottles should stack up to 16
stackWaterBottles = true
#Whether corn mazes should spawn in the world
generateCornMazes = true
#Disables milking cows and goats with glass bottles. 
#Be aware that setting this can cause goat milk bottles to be unobtainable unless handled otherwise
disableBottleMilking = false
#Whether a ghost preview of the trellis piece is shown before placing
trellisPlacementPreview = true
#Multiplier applied to a food's nutrition value to determine bonus hunger granted when eating salted food.
#For example, 0.2 means a food restoring 5 hunger gets +1 bonus hunger (20% of 5, minimum 1 for foods with less than 5 hunger).
# Default: 0.2
# Range: 0.0 ~ 1.0
saltedHungerBonus = 0.2
#Fraction of the saturation granted by a food that is removed when eating salted food.
#For example, 0.1 means 10% of the saturation normally given is taken away.
# Default: 0.1
# Range: 0.0 ~ 1.0
saltedSaturationPenalty = 0.1
#Radius in blocks that animals are kept within when near a salt block.
# Default: 12
# Range: 1 ~ 64
saltAnimalRadius = 12
#Ticks between each animal licking a nearby salt block. 9600 = 8 minutes.
# Default: 9600
# Range: 200 ~ 72000
saltLickInterval = 9600
#Chance (0.0–1.0) that a player's right-click lick degrades the salt block.
# Default: 0.05
# Range: 0.0 ~ 1.0
saltPlayerLickChance = 0.05
#Max animals in a 10-block radius before the food trough stops triggering breeding.
# Default: 16
# Range: 1 ~ 256
troughBreedingCap = 1

[manure]
	#Drop manure after being fed
	fedPoopEnabled = false
	#Drop manure randomly over time
	randomPoopEnabled = false
	#1-in-N chance per second for random drop
	# Default: 300
	# Range: 1 ~ 10000
	randomPoopChance = 300
