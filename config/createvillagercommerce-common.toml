["Villager Commerce Rules"]
	#If true, villagers will only buy sale items listed in item_whitelist.
	enable_item_whitelist = false
	#Sale items villagers are allowed to buy when item whitelist is enabled.
	#Use item IDs like minecraft:bread or create:cogwheel.
	item_whitelist = ["minecraft:bread", "minecraft:apple", "minecraft:carrot"]
	#Sale items villagers will never buy.
	#Blacklist always wins over whitelist.
	item_blacklist = ["minecraft:dirt", "minecraft:stick"]

["Currency Rules"]
	#If true, villagers will only pay using currency items listed in currency_whitelist.
	enable_currency_whitelist = false
	#Allowed payment/currency items.
	#When Create: Numismatics is installed, examples are numismatics:spur, numismatics:bevel, numismatics:cog.
	#When Create: Numismatics is not installed, minecraft:iron_ingot is used by the built-in fallback trades.
	currency_whitelist = ["minecraft:iron_ingot", "numismatics:spur", "numismatics:bevel", "numismatics:cog"]
	#Payment/currency items that are never allowed.
	#Blacklist always wins over whitelist.
	currency_blacklist = []

["Trade Mode Rules"]
	#If true, players can choose stall sale items and prices freely.
	#If false, villagers only buy exact trades from built-in preset trades plus server_preset_trades.
	allow_player_chosen_trades = false
	#If true, the mod adds its built-in balanced preset trade list.
	#The list automatically uses Numismatics currency when Numismatics is installed.
	#If Numismatics is missing, the same value ladder is converted into iron ingots.
	enable_builtin_preset_trades = true
	#Currency mode for built-in preset trades.
	#auto = use Numismatics if installed, otherwise iron fallback.
	#numismatics = use Numismatics currency if installed, otherwise iron fallback.
	#iron = always use iron ingots.
	#Fallback values: 1 spur = 1 iron ingot, 1 bevel = 8 iron ingots, 1 cog = 64 iron ingots.
	preset_trade_currency_mode = "auto"
	#Extra server preset trades used when allow_player_chosen_trades is false.
	#These are added after the built-in preset trades.
	#Format: sale_item_id,sale_quantity,currency_item_id,price_quantity
	#Example with Numismatics installed: minecraft:diamond,1,numismatics:cog,1
	#Example without Numismatics: minecraft:diamond,1,minecraft:iron_ingot,64
	#Leave empty to use only the built-in balanced preset trades.
	server_preset_trades = []

["Villager Shopping Behavior"]
	#How often villagers check for nearby merchant stalls.
	#20 ticks = 1 second. Default 40 = 2 seconds.
	# Default: 40
	# Range: 20 ~ 12000
	shopping_check_interval_ticks = 40
	#Random chance denominator for shopping mood.
	#1 means villagers try to shop every valid check.
	# Default: 1
	# Range: 1 ~ 1000
	shopping_chance_denominator = 1
	#Cooldown after a villager successfully buys something.
	#20 ticks = 1 second. Default 400 = 20 seconds.
	# Default: 400
	# Range: 20 ~ 72000
	shopping_cooldown_ticks = 400
	#How far villagers search for merchant stalls if they are not registered to a market.
	# Default: 32
	# Range: 4 ~ 128
	shopping_radius = 32

["Market Ledger Rules"]
	#If true, villagers only buy from Merchant Stalls linked to a valid Market Ledger.
	#A valid Market Ledger is a vanilla lectern holding a book named exactly Market Ledger.
	require_market_ledger = true
	#Horizontal radius of each Market Ledger in blocks.
	#Merchant Stalls must be inside this radius to count for that market.
	#Registered villagers must remain inside this radius to use remote ledger trading.
	# Default: 64
	# Range: 4 ~ 256
	market_ledger_radius = 64
	#Base number of villager purchases allowed per Market Ledger per Minecraft day.
	# Default: 8
	# Range: 0 ~ 10000
	market_ledger_base_purchases_per_day = 8
	#Extra purchases per Minecraft day for each registered player with stalls in this market.
	# Default: 4
	# Range: 0 ~ 10000
	market_ledger_bonus_purchases_per_registered_player = 4
	#Maximum purchases per Market Ledger per Minecraft day after base and player bonuses.
	# Default: 32
	# Range: 1 ~ 10000
	market_ledger_max_purchases_per_day = 32
	#Maximum active Merchant Stalls each player can have per Market Ledger.
	#0 means unlimited.
	#If a player has more than this many stalls in one market, the extra stalls stay placed but villagers ignore them.
	#Over-limit stalls appear in the Market Ledger with the status Over player stall limit.
	# Default: 4
	# Range: 0 ~ 1024
	max_merchant_stalls_per_player = 4
	#Maximum active Market Ledgers allowed per dimension/world.
	#0 means unlimited.
	#Extra Market Ledgers stay placed but become inactive.
	#Inactive Market Ledgers cannot bind Merchant Stalls and stalls linked to them will not receive villager purchases.
	#The first active ledgers are chosen deterministically by position.
	# Default: 8
	# Range: 0 ~ 100000
	max_market_ledgers_per_world = 8
	#If true, Market Ledgers cannot overlap.
	#When binding a Merchant Stall item to a ledger, another valid ledger closer than radius * 2 will block binding.
	#This check only runs on player interaction, not every tick.
	prevent_market_overlap = true

["Villager Market Registration"]
	#If true, villagers can register themselves to Market Ledgers during the configured morning window.
	#Registered villagers prefer shopping in their assigned market, which reduces broad stall searching.
	enable_villager_market_registration = true
	#If true, players can click registered villagers in the Market Ledger GUI to open their normal trading screen.
	#The villager must be loaded, alive, adult, registered to that ledger, and inside the market radius.
	allow_remote_villager_trading_from_ledger = true
	#Minecraft day time when villagers may start registering to markets.
	#0 is dawn. Default 0.
	# Default: 0
	# Range: 0 ~ 23999
	villager_registration_start_time = 0
	#Minecraft day time when villagers stop registering to markets.
	#Default 4000 is late morning.
	# Default: 4000
	# Range: 0 ~ 23999
	villager_registration_end_time = 4000
	#Maximum known nearby stalls a villager checks when trying to find a ledger for registration.
	#Lower values are safer for large servers. Higher values may help huge markets register more reliably.
	# Default: 24
	# Range: 1 ~ 256
	max_stalls_considered_for_villager_registration = 24
	#Maximum known market stalls a registered villager considers when choosing where to shop.
	#This limits per-villager shopping work inside large markets.
	# Default: 24
	# Range: 1 ~ 256
	max_registered_market_stalls_considered = 24

["Market Cleanup"]
	#Removes registered villager records after this many Minecraft days without being seen in their market.
	#Set to 0 to disable automatic removal of missing villager records.
	# Default: 7
	# Range: 0 ~ 100000
	remove_missing_villagers_after_days = 7
	#If true, registered villager records are removed when their Market Ledger no longer exists or is no longer valid.
	remove_villagers_when_ledger_invalid = true
	#If true, the Villagers tab shows statuses like Missing 3 days or Away.
	show_missing_villager_status = true
