#Whether the cosmetic hat items (merged in from Witchy Wearables) are registered at all.
#When false, the items are never added to any registry -- they won't exist in creative,
#JEI, recipes, or anywhere else, and cost no memory. Takes effect on next launch.
#NOT synced between client and server -- keep this the same on both, or a client may
#fail to connect to a server running a different value.
wearablesEnabled = true
#Whether pre-enchanted loot (chests, fishing, mob drops) gets its enchantments obfuscated
#until identified. When false, none of this feature's items/data are registered at all.
#Takes effect on next launch. NOT synced between client and server -- keep this the same
#on both, or a client may fail to connect to a server running a different value.
identificationEnabled = true
#Max durability of the identification rune item -- it loses 1 durability per identification.
#Set to 0 for unlimited uses (no durability bar at all). Takes effect on next launch.
# Default: 1
# Range: > 0
identificationRuneMaxDurability = 1
